<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity · Nexus</title>
    <link rel="icon" type="image/png" href="assets/favico.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="src/css/tailwind-output.css">
    <link rel="stylesheet" href="src/css/styles.css" />
    <link rel="stylesheet" href="src/css/dashboard.css" />
    <style>
        .glass-panel { background: rgba(24, 24, 27, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .scrollbar-custom::-webkit-scrollbar { width: 5px; }
        .scrollbar-custom::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-custom::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scrollbar-custom::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.6rem 1rem;
            color: #a1a1aa;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-align: left;
        }
        .sidebar-link i { font-size: 1.25rem; }
        .sidebar-link:hover { color: #fafafa; background: rgba(255,255,255,0.03); }
        .sidebar-link.active { color: #a855f7; background: rgba(168,85,247,0.1); font-weight: 600; }
        .skeleton {
            background: linear-gradient(90deg, rgba(30,30,35,0.6) 25%, rgba(50,50,58,0.8) 50%, rgba(30,30,35,0.6) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 6px;
            display: inline-block;
        }
        .skeleton-text { height: 16px; border-radius: 4px; background: linear-gradient(90deg, rgba(30,30,35,0.6) 25%, rgba(50,50,58,0.8) 50%, rgba(30,30,35,0.6) 75%); background-size: 200% 100%; animation: shimmer 1.8s ease-in-out infinite; }
        .skeleton-badge { height: 24px; border-radius: 30px; background: linear-gradient(90deg, rgba(30,30,35,0.6) 25%, rgba(50,50,58,0.8) 50%, rgba(30,30,35,0.6) 75%); background-size: 200% 100%; animation: shimmer 1.8s ease-in-out infinite; }
        .skeleton-icon { background: linear-gradient(90deg, rgba(30,30,35,0.6) 25%, rgba(50,50,58,0.8) 50%, rgba(30,30,35,0.6) 75%); background-size: 200% 100%; animation: shimmer 1.8s ease-in-out infinite; border-radius: 10px; }
        .skeleton-card { position: relative; overflow: hidden; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @media (max-width: 640px) { .skeleton-text { height: 14px; } }
        .fade-in-up { animation: fadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; opacity: 0; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .btn-danger {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.25s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
        }
        .btn-danger:active { transform: scale(0.96); }
        .btn-danger:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-ghost {
            background: transparent;
            color: #a1a1aa;
            border: 1px solid rgba(255,255,255,0.06);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.8rem;
            transition: all 0.25s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.06);
            color: #e4e4e7;
            border-color: rgba(255,255,255,0.12);
        }
        .device-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }
        .device-icon.desktop { background: rgba(168,85,247,0.1); color: #a855f7; border: 1px solid rgba(168,85,247,0.15); }
        .device-icon.mobile { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.15); }
        .device-icon.tablet { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.15); }
        .relative-time {
            font-size: 0.7rem;
            color: #71717a;
            font-weight: 500;
        }
        .relative-time.active { color: #34d399; }
        @media (max-width: 640px) {
            .btn-danger, .btn-ghost { font-size: 0.7rem; padding: 0.4rem 0.8rem; }
        }
    </style>
</head>
<body class="bg-background text-zinc-300 font-sans antialiased flex h-screen overflow-hidden">

    <aside class="w-64 bg-surface border-r border-border hidden md:flex flex-col flex-shrink-0 relative z-20">
        <div class="h-16 flex items-center px-6 border-b border-border">
            <a href="/" class="flex items-center gap-2 cursor-pointer">
                <div class="w-8 h-8 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center text-primary">
                    <i class="ph-fill ph-brain text-lg"></i>
                </div>
                <span class="text-lg font-bold tracking-tight text-white">Nexus</span>
            </a>
        </div>
        <nav class="flex-1 py-6 px-3 space-y-1 overflow-y-auto">
            <a href="/dashboard" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="ph-bold ph-squares-four text-lg"></i> Dashboard
            </a>
            <a href="/activity" class="sidebar-link active w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="ph-bold ph-clock-counter-clockwise text-lg"></i> Activity
            </a>
            <a href="/billing" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="ph-bold ph-credit-card text-lg"></i> Billing
            </a>
            <a href="/docs" class="sidebar-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
                <i class="ph-bold ph-book-open text-lg"></i> Documentation
            </a>
        </nav>
        <div class="p-4 border-t border-border">
            <div class="flex items-center gap-3 p-2 rounded-lg bg-black/20 border border-white/5">
                <img id="sidebarAvatar" src="" alt="avatar" class="w-8 h-8 rounded-full border border-white/10" />
                <div class="flex-1 min-w-0">
                    <div id="sidebarName" class="text-sm font-semibold text-white truncate">User</div>
                    <div id="sidebarEmail" class="text-xs text-zinc-500 truncate">user@example.com</div>
                </div>
            </div>
            <button id="sidebarSignOut" class="w-full mt-3 flex items-center justify-center gap-2 text-sm text-zinc-400 hover:text-red-400 transition-colors py-2">
                <i class="ph-bold ph-sign-out"></i> Sign Out
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 h-screen relative">
        <div class="ambient-glow" style="top: -10%; left: 30%;"></div>
        <header class="h-16 flex items-center justify-between px-6 border-b border-border bg-background/80 backdrop-blur-md z-10 flex-shrink-0">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-zinc-400 hover:text-white" id="mobileMenuBtn">
                    <i class="ph-bold ph-list text-2xl"></i>
                </button>
                <div class="text-sm font-medium text-zinc-400 flex items-center gap-2">
                    <span id="breadcrumbRoot">Nexus</span>
                    <i class="ph-bold ph-caret-right text-xs"></i>
                    <span id="breadcrumbCurrent" class="text-white">Activity</span>
                </div>
            </div>
            <div class="flex items-center gap-4 hidden md:flex">
                <a href="https://github.com/thekaifansari01/NexusWeb" target="_blank" class="text-sm font-medium text-zinc-400 hover:text-white transition-colors flex items-center gap-1">
                    <i class="ph-bold ph-github-logo text-lg"></i> GitHub
                </a>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto overflow-x-hidden p-6 md:p-10 relative z-10 scrollbar-custom">
            <div class="max-w-5xl mx-auto pb-20">
                <div class="mb-8">
                    <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white mb-2">Login Activity & Sessions</h1>
                    <p class="text-sm text-zinc-400">Monitor and manage your active sessions across different devices and locations.</p>
                </div>

                <div class="glass-panel rounded-2xl p-6 border border-white/5 bg-black/20">
                    <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                        <h2 class="text-lg font-bold text-zinc-200 flex items-center gap-2">
                            <i class="ph-bold ph-shield-check text-emerald-400"></i> Active Sessions
                        </h2>
                        <div class="flex items-center gap-3 flex-wrap">
                            <button id="refreshBtn" class="btn-ghost" title="Refresh sessions">
                                <i class="ph-bold ph-arrows-clockwise text-base"></i> Refresh
                            </button>
                            <button id="logoutAllBtn" class="btn-danger">
                                <i class="ph-bold ph-sign-out text-base"></i> Sign Out All Others
                            </button>
                        </div>
                    </div>
                    <div id="sessionsContainer" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js",
                "firebase/analytics": "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js"
            }
        }
    </script>
    <script type="module" src="src/js/activity.js"></script>
</body>
</html>
