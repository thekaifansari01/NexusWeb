<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus — Premium Navbar</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="src/css/tailwind-output.css" />
    <link rel="stylesheet" href="src/css/styles.css" />
    <link rel="stylesheet" href="src/css/landingPage.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <div class="w-full max-w-6xl mx-auto relative">

        <nav class="glass-nav w-full rounded-full px-5 py-3 md:px-8 md:py-3.5 flex items-center justify-between gap-3 fixed top-4 left-1/2 -translate-x-1/2 max-w-[95%] lg:max-w-6xl" id="navbar" role="navigation">

            <a href="/" class="flex items-center gap-3 no-underline group flex-shrink-0">
                <div class="logo-icon relative w-10 h-10 rounded-full bg-primary/10 border border-primary/30 flex items-center justify-center text-primary logo-pulse">
                    <i class="ph-fill ph-brain text-xl"></i>
                    <div class="logo-ring"></div>
                </div>
                <span class="logo-text text-xl font-black tracking-tight text-white group-hover:text-zinc-200 transition-colors">Nexus<span class="text-primary">.</span></span>
            </a>

            <div class="nav-links hidden md:flex items-center gap-8 xl:gap-10">
                <a href="/docs" class="nav-link active">Docs</a>
                <a href="/pricing" class="nav-link">Pricing</a>
                <a href="/demo" class="nav-link">Demo</a>
                <a href="/playground" class="nav-link">Playground</a>

                <div class="resources-dropdown">
                    <button class="resources-toggle" aria-haspopup="true" aria-expanded="false">
                        Resources <i class="ph-bold ph-caret-down"></i>
                    </button>
                    <div class="premium-dropdown resources-menu" role="menu">
                        <a href="/blog" class="dropdown-item" role="menuitem"><i class="ph-duotone ph-file-text"></i> Blog</a>
                        <a href="/docs#api-reference" class="dropdown-item" role="menuitem"><i class="ph-duotone ph-code"></i> API Reference</a>
                        <a href="/changelog" class="dropdown-item" role="menuitem"><i class="ph-duotone ph-clock-counter-clockwise"></i> Changelog</a>
                        <div class="menu-divider"></div>
                        <a href="/community" class="dropdown-item" role="menuitem"><i class="ph-duotone ph-users"></i> Community</a>
                        <a href="/support" class="dropdown-item" role="menuitem"><i class="ph-duotone ph-lifebuoy"></i> Support</a>
                    </div>
                </div>
            </div>

            <div id="authSection" class="flex items-center gap-4">
                <a href="/login" id="loginBtn" class="btn-login inline-flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold text-zinc-300 hover:text-white transition-all border border-white/10 hover:border-white/30 hover:bg-white/10 hover:shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                    <i class="ph-bold ph-sign-in text-base"></i> Login
                </a>

                <div id="avatarContainer" class="relative hidden">
                    <button class="avatar-btn" id="avatarBtn" aria-label="Account">
                        <span id="avatarInitials">U</span>
                        <img id="avatarImg" src="" alt="Avatar" class="hidden" />
                    </button>

                    <div class="premium-dropdown avatar-dropdown" id="avatarDropdown" role="menu">
                        <div class="user-info px-4 py-3 border-b border-white/10 mb-1">
                            <div class="name font-semibold text-white text-sm tracking-wide" id="dropdownName">User</div>
                            <div class="email text-xs text-zinc-400 mt-1 truncate" id="dropdownEmail">user@example.com</div>
                            <span class="tier inline-block mt-2 text-[10px] font-bold px-2.5 py-0.5 rounded-full bg-primary/20 text-primary border border-primary/30 uppercase tracking-widest shadow-[0_0_10px_rgba(168,85,247,0.2)]">Free</span>
                        </div>
                        <a href="/dashboard" class="dropdown-item"><i class="ph-duotone ph-layout-dashboard"></i> Dashboard</a>
                        <a href="/settings" class="dropdown-item"><i class="ph-duotone ph-gear"></i> Settings</a>
                        <a href="/billing" class="dropdown-item"><i class="ph-duotone ph-credit-card"></i> Billing</a>
                        <div class="menu-divider" style="height: 1px; background: rgba(255,255,255,0.05); margin: 6px 12px;"></div>
                        <button class="dropdown-item danger" id="signOutBtn"><i class="ph-bold ph-sign-out"></i> Sign Out</button>
                    </div>
                </div>

                <button class="hamburger md:hidden" id="hamburgerBtn" aria-label="Toggle menu" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>

        </nav>

        <div class="mobile-overlay" id="mobileMenu" role="dialog" aria-modal="true">
            <a href="/docs" class="mobile-link"><i class="ph-duotone ph-book-open"></i> Docs</a>
            <a href="/pricing" class="mobile-link"><i class="ph-duotone ph-tag"></i> Pricing</a>
            <a href="/demo" class="mobile-link"><i class="ph-duotone ph-play-circle"></i> Demo</a>
            <a href="/playground" class="mobile-link"><i class="ph-duotone ph-code"></i> Playground</a>

            <div class="mobile-resources">
                <div class="mobile-link" style="border-bottom:none;">
                    <i class="ph-duotone ph-folder-open"></i> Resources
                </div>
                <div class="sub-links">
                    <a href="/blog"><i class="ph-bold ph-file-text"></i> Blog</a>
                    <a href="/docs#api-reference"><i class="ph-bold ph-code"></i> API Reference</a>
                    <a href="/changelog"><i class="ph-bold ph-clock-counter-clockwise"></i> Changelog</a>
                    <a href="/community"><i class="ph-bold ph-users"></i> Community</a>
                    <a href="/support"><i class="ph-bold ph-lifebuoy"></i> Support</a>
                </div>
            </div>

            <div class="mobile-ctas" id="mobileCtas">
                <a href="/login" class="btn-ghost-mobile" id="mobileLoginBtn"><i class="ph-bold ph-sign-in"></i> Login</a>
                <button id="mobileSignOutBtn" class="btn-danger-mobile hidden"><i class="ph-bold ph-sign-out"></i> Sign Out</button>
            </div>
        </div>

    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";

        // Tumhara exact config
        const firebaseConfig = {
            apiKey: "AIzaSyCfa1fP3XGvWUVy0LQJvQH0qYp2hOkHzfU",
            authDomain: "trynexus-6db37.firebaseapp.com",
            projectId: "trynexus-6db37",
            storageBucket: "trynexus-6db37.firebasestorage.app",
            messagingSenderId: "754293000577",
            appId: "1:754293000577:web:09677142cdd844b8421ed1",
            measurementId: "G-4LGHBLFG60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // DOM Elements
        const loginBtn = document.getElementById('loginBtn');
        const avatarContainer = document.getElementById('avatarContainer');
        const avatarBtn = document.getElementById('avatarBtn');
        const avatarImg = document.getElementById('avatarImg');
        const avatarInitials = document.getElementById('avatarInitials');
        const dropdownName = document.getElementById('dropdownName');
        const dropdownEmail = document.getElementById('dropdownEmail');
        const avatarDropdown = document.getElementById('avatarDropdown');
        const signOutBtn = document.getElementById('signOutBtn');
        
        // Mobile DOM Elements
        const mobileLoginBtn = document.getElementById('mobileLoginBtn');
        const mobileSignOutBtn = document.getElementById('mobileSignOutBtn');

        function getInitials(name) {
            if (!name) return 'U';
            const parts = name.trim().split(' ');
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return name.slice(0, 2).toUpperCase();
        }

        function updateUI(user) {
            if (user) {
                // User Logged In
                loginBtn.classList.add('hidden');
                avatarContainer.classList.remove('hidden');

                const displayName = user.displayName || user.email?.split('@')[0] || 'User';
                const email = user.email || 'user@example.com';
                
                dropdownName.textContent = displayName;
                dropdownEmail.textContent = email;

                if (user.photoURL) {
                    avatarImg.src = user.photoURL;
                    avatarImg.classList.remove('hidden');
                    avatarInitials.classList.add('hidden');
                } else {
                    avatarInitials.textContent = getInitials(displayName);
                    avatarInitials.classList.remove('hidden');
                    avatarImg.classList.add('hidden');
                }

                // Update Mobile Menu Auth State
                if (mobileLoginBtn) {
                    mobileLoginBtn.textContent = 'Dashboard';
                    mobileLoginBtn.href = '/dashboard';
                    mobileLoginBtn.className = 'btn-primary-mobile';
                    mobileLoginBtn.innerHTML = '<i class="ph-bold ph-layout-dashboard"></i> Dashboard';
                }
                if (mobileSignOutBtn) {
                    mobileSignOutBtn.classList.remove('hidden');
                }
            } else {
                // User Logged Out
                loginBtn.classList.remove('hidden');
                avatarContainer.classList.add('hidden');

                if (mobileLoginBtn) {
                    mobileLoginBtn.textContent = 'Login';
                    mobileLoginBtn.href = '/login';
                    mobileLoginBtn.className = 'btn-ghost-mobile';
                    mobileLoginBtn.innerHTML = '<i class="ph-bold ph-sign-in"></i> Login';
                }
                if (mobileSignOutBtn) {
                    mobileSignOutBtn.classList.add('hidden');
                }
            }
        }

        onAuthStateChanged(auth, updateUI);

        // Desktop Dropdown Logic
        if (avatarBtn) {
            avatarBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                avatarDropdown.classList.toggle('open');
            });
            document.addEventListener('click', (e) => {
                if (!avatarBtn.contains(e.target) && !avatarDropdown.contains(e.target)) {
                    avatarDropdown.classList.remove('open');
                }
            });
        }

        // Shared Logout Function
        const handleSignOut = async () => {
            try {
                await signOut(auth);
                avatarDropdown.classList.remove('open');
                if (mobileMenu && mobileMenu.classList.contains('open')) {
                    toggleMobileMenu(false);
                }
            } catch (err) {
                console.error('Sign out error:', err);
            }
        };

        if (signOutBtn) signOutBtn.addEventListener('click', handleSignOut);
        if (mobileSignOutBtn) mobileSignOutBtn.addEventListener('click', handleSignOut);

        // Mobile Menu Logic
        const hamburger = document.getElementById('hamburgerBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        function toggleMobileMenu(forceOpen) {
            const isOpen = forceOpen !== undefined ? forceOpen : !mobileMenu.classList.contains('open');
            mobileMenu.classList.toggle('open', isOpen);
            hamburger.classList.toggle('open', isOpen);
            hamburger.setAttribute('aria-expanded', isOpen);
            document.body.style.overflow = isOpen ? 'hidden' : '';
        }

        if (hamburger && mobileMenu) {
            hamburger.addEventListener('click', () => toggleMobileMenu());
            
            // Close menu on link click
            mobileMenu.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => toggleMobileMenu(false));
            });
        }

        // Keyboard Accessibility (Escape to close)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (mobileMenu && mobileMenu.classList.contains('open')) toggleMobileMenu(false);
                if (avatarDropdown && avatarDropdown.classList.contains('open')) avatarDropdown.classList.remove('open');
            }
        });

        // Optimized Scroll Listener (Throttled for Performance)
        const navbar = document.getElementById('navbar');
        let ticking = false;

        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    if (window.scrollY > 20) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: true });
    </script>
</body>
</html>
