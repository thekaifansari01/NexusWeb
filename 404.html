<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Nexus</title>
    <link rel="icon" type="image/png" href="assets/favico.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="src/css/tailwind-output.css">
    <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body class="bg-background text-zinc-300 font-sans antialiased h-screen flex items-center justify-center overflow-hidden">

    <div class="ambient-glow" style="top: -20%; left: 50%;"></div>

    <div class="relative z-10 max-w-2xl mx-auto px-6 text-center">

        <div class="flex justify-center mb-6">
            <a href="/" class="flex items-center gap-2 cursor-pointer">
                <div class="w-12 h-12 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center text-primary">
                    <i class="ph-fill ph-brain text-2xl"></i>
                </div>
            </a>
        </div>

        <h1 class="text-8xl md:text-9xl font-extrabold tracking-tight text-transparent bg-gradient-to-r from-primary to-primaryHover bg-clip-text select-none">
            404
        </h1>

        <div class="mt-4 mb-6">
            <div class="inline-block glass-panel px-4 py-1.5 rounded-full text-xs font-medium text-zinc-400 border border-white/5">
                <i class="ph-bold ph-compass mr-1.5 text-primary"></i> Lost in the void
            </div>
        </div>

        <h2 class="text-2xl md:text-3xl font-bold text-white mb-3 tracking-tight">
            Page not found
        </h2>

        <p class="text-zinc-400 text-base md:text-lg max-w-md mx-auto leading-relaxed">
            The page you are looking for doesn't exist or has been moved.
            Let's get you back on track.
        </p>

        <div class="mt-10 flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="glass-panel text-white px-8 py-3.5 rounded-full text-sm font-semibold transition-all flex items-center justify-center gap-2 hover:border-primary/30 hover:bg-white/5">
                <i class="ph-bold ph-house text-lg"></i> Go Home
            </a>
            <a href="/login" class="bg-primary hover:bg-primaryHover text-white px-8 py-3.5 rounded-full text-sm font-semibold transition-all shadow-[0_0_15px_rgba(168,85,247,0.3)] hover:shadow-[0_0_25px_rgba(168,85,247,0.5)] flex items-center justify-center gap-2">
                <i class="ph-bold ph-sign-in text-lg"></i> Sign In
            </a>
        </div>

        <div class="mt-12 text-xs text-zinc-600">
            <span class="flex items-center justify-center gap-2">
                <i class="ph-bold ph-brain text-primary/40"></i>
                Nexus · 2026
            </span>
        </div>

    </div>

</body>
</html>
